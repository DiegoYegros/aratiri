plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.0'
    id 'com.google.protobuf' version '0.9.5'
    id 'pl.allegro.tech.build.axion-release' version '1.21.1'
    id 'name.remal.sonarlint' version '7.0.1'
}

group = 'com.aratiri'
description = 'A multi-user Bitcoin Lightning and on-chain middleware platform'

scmVersion {
    tag {
        prefix.set('v')
    }
    useHighestVersion.set(true)
    versionCreator('simple')
    versionIncrementer('incrementPatch')
    releaseOnlyOnReleaseBranches = true
    releaseBranchNames = ['master']
}

version = providers.gradleProperty('appVersion')
        .orElse(provider { scmVersion.version })
        .get()

ext {
    grpcVersion = '1.72.0'
    protobufVersion = '4.30.2'
    springGrpcVersion = '0.8.0'
    springdocOpenapiStarterWebmvcUiVersion = '2.8.0'
    zxingVersion = '3.5.3'
    jsonWebTokenVersion = '0.11.5'
    jakartaAnnotationApiVersion = '2.1.1'
    googleApiClientVersion = '2.2.0'
    javaWebSocketVersion = '1.5.3'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

springBoot {
    buildInfo()
}

sonarLint {
    ignoreFailures = false
    isGeneratedCodeIgnored = true
    languages {
        include('java')
    }
    ignoredPaths.add('build/**')
    ignoredPaths.add('**/generated/**')
    rules {
        // Initial gate baseline: these rules already flag legacy code and should be re-enabled as focused cleanup PRs.
        disable(
                'java:S1192',
                'java:S1186',
                'java:S3776',
                'java:S2387',
                'java:S6809',
                'java:S1452',
                'java:S1128',
                'java:S1874',
                'java:S7467',
                'java:S135',
                'java:S6201',
                'java:S1130',
                'java:S119',
                'java:S2094',
                'java:S1165',
                'java:S1488',
                'java:S2245',
                'java:S4502',
                'java:S6204',
                'java:S1118',
                'java:S112',
                'java:S1181',
                'java:S2139',
                'java:S1141',
                'java:S1172',
                'java:S106',
                'java:S6218',
                'java:S2629',
                'java:S3457',
                'java:S2142',
                'java:S1481',
                'java:S1144',
                'java:S6126',
                'java:S1068'
        )
    }
}

dependencies {
    implementation platform(org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES)
    implementation platform("org.springframework.grpc:spring-grpc-dependencies:${springGrpcVersion}")
    annotationProcessor platform(org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES)
    testImplementation platform(org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES)
    testAnnotationProcessor platform(org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES)

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    implementation "org.springdoc:springdoc-openapi-starter-webmvc-ui:${springdocOpenapiStarterWebmvcUiVersion}"
    runtimeOnly 'com.h2database:h2'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'
    implementation "com.google.api-client:google-api-client:${googleApiClientVersion}"
    implementation 'org.springframework.kafka:spring-kafka'
    implementation "com.google.zxing:core:${zxingVersion}"
    implementation "com.google.zxing:javase:${zxingVersion}"
    implementation "io.grpc:grpc-netty-shaded:${grpcVersion}"
    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"
    implementation "com.google.protobuf:protobuf-java-util:${protobufVersion}"
    implementation "io.jsonwebtoken:jjwt-api:${jsonWebTokenVersion}"
    runtimeOnly "io.jsonwebtoken:jjwt-impl:${jsonWebTokenVersion}"
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly "io.jsonwebtoken:jjwt-jackson:${jsonWebTokenVersion}"
    implementation "jakarta.annotation:jakarta.annotation-api:${jakartaAnnotationApiVersion}"
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'com.github.ben-manes.caffeine:caffeine'
    implementation "org.java-websocket:Java-WebSocket:${javaWebSocketVersion}"

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
        }
    }
    generateProtoTasks {
        all().configureEach { task ->
            task.plugins {
                grpc {
                    option '@generated=omit'
                }
            }
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += '-parameters'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('check') {
    dependsOn(tasks.matching { task ->
        task.name in ['sonarLintMain', 'sonarLintTest', 'sonarlintMain', 'sonarlintTest']
    })
}

tasks.named('jar') {
    enabled = false
}
