name: Deploy Aratiri App
on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Resolve app version and Docker tags
        run: |
          APP_VERSION="$(./gradlew cV -q -Prelease.quiet)"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/aratiri-app"

          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          {
            echo "DOCKER_TAGS<<EOF"
            echo "${IMAGE}:${GITHUB_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
              echo "${IMAGE}:${APP_VERSION}"
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Build with Gradle
        run: ./gradlew --no-daemon clean build
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            VCS_REF=${{ github.sha }}
          tags: ${{ env.DOCKER_TAGS }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_TAILSCALE }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/aratiri
            git pull origin master
            docker compose pull aratiri-app
            docker compose up -d --no-deps --force-recreate aratiri-app
